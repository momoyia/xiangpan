name: xingxu_app
description: "相盼 - 健身锻炼分享 App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  webview_flutter: ^4.10.0
  webview_flutter_wkwebview: ^3.22.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  image_path: assets/images/xiangpan logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/xiangpan logo.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
